name: Package Verify

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  package-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Ruff lint and format
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/integration \
            --ignore=tests/performance \
            -m "not slow" \
            -q

      - name: Build distributions
        run: uv run --with build python -m build

      - name: Smoke install built wheel
        run: |
          python -m venv /tmp/blop-dist-smoke
          . /tmp/blop-dist-smoke/bin/activate
          pip install dist/*.whl
          blop --help
          blop-mcp --help

      - name: Smoke install built sdist
        run: |
          python -m venv /tmp/blop-sdist-smoke
          . /tmp/blop-sdist-smoke/bin/activate
          pip install dist/*.tar.gz
          blop --help
          blop-mcp --help
